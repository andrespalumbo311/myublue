[preferred]
# Fallback a catena: GNOME prima (più interfacce), poi GTK
default=gnome;gtk;

# ScreenCast, Screenshot e RemoteDesktop → GNOME (unico backend funzionante su niri via PipeWire)
org.freedesktop.impl.portal.ScreenCast=gnome
org.freedesktop.impl.portal.Screenshot=gnome
org.freedesktop.impl.portal.RemoteDesktop=gnome

# FileChooser → GTK (evita Nautilus come picker predefinito)
org.freedesktop.impl.portal.FileChooser=gtk

# Access e Notification → GTK (più leggero, sufficiente)
org.freedesktop.impl.portal.Access=gtk
org.freedesktop.impl.portal.Notification=gtk

# Secret → gnome-keyring (portafoglio chiavi)
org.freedesktop.impl.portal.Secret=gnome-keyring

# Settings → GNOME (tema, font scaling, preferenze di sistema)
org.freedesktop.impl.portal.Settings=gnome
