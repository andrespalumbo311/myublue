<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Mapping dei font Adwaita come default di sistema -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Adwaita Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Adwaita Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Adwaita Mono</family>
    </prefer>
  </alias>

  <!-- Fallback per Chromium/Helium quando cerca genericamente 'sans' -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans</string></test>
    <edit name="family" mode="assign" binding="same"><string>Adwaita Sans</string></edit>
  </match>
</fontconfig>
