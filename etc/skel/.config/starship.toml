# Starship prompt configuration
format = """
$username$hostname$directory$git_branch$git_status$python$nodejs$rust$fill$cmd_duration$jobs$time
$character"""

[directory]
style = "bold blue"
truncate_to_repo = true
truncation_length = 3

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
symbol = " "
style = "bold magenta"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "

[fill]
symbol = " "
