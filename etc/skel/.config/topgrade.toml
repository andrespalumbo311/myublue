# Topgrade configuration
# https://github.com/topgrade-rs/topgrade/blob/master/config.example.toml

[misc]
# Perform only specified steps
only = ["system", "brew_formula", "brew_cask", "flatpak", "distrobox"]

# Disable 'node' (which updates npm) to prevent symlink conflicts with Homebrew
disable = ["node"]

[linux]
# Enable bootc for Fedora/CentOS/RHEL Atomic variants
bootc = true
