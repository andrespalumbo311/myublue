# Topgrade configuration
# https://github.com/topgrade-rs/topgrade/blob/master/config.example.toml

[misc]
# Disable steps that cause conflicts or are unwanted
# Note: disable expects a list of strings
disable = ["npm"]

[linux]
# Enable bootc for Fedora/CentOS/RHEL Atomic variants
# This allows Topgrade to use 'sudo bootc upgrade' correctly.
bootc = true
