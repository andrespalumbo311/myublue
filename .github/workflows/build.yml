---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'CONTRIBUTING.md'
      - 'PROJECTS.md'
      - 'LICENSE'
      - 'artifacthub-repo.yml'
      - '.gitignore'
      - '.github/dependabot.yml'
      - '.github/renovate.json5'
  workflow_dispatch:

env:
  IMAGE_DESC: "My Customized Universal Blue Image"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"  # Put your own image here for a fancy profile on https://artifacthub.io/!
  IMAGE_NAME: "${{ github.event.repository.name }}"  # output image name, usually same as repo name
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # This is optional, but if you see that your builds are way too big for the runners, you can enable this by uncommenting the following lines:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      # Image metadata for https://artifacthub.io/ - This is optional but is highly recommended so we all can get a index of all the custom images
      # The metadata by itself is not going to do anything, you choose if you want your image to be on ArtifactHub or not.
      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          # This generates all the tags for your image, you can add custom tags here too!
          # Default tags are "$DEFAULT_TAG" and "$DEFAULT_TAG.$date".
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        run: |
          # Convert multi-line labels to buildah --label format
          echo "${{ steps.metadata.outputs.labels }}" > labels.txt
          LABEL_ARGS=()
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              LABEL_ARGS+=("--label" "$line")
            fi
          done < labels.txt

          # Create temp files for secrets
          echo "${{ secrets.MOK_KEY }}" > MOK.key
          echo "${{ secrets.MOK_CRT }}" > MOK.crt

          # Build directly in root storage (sudo)
          sudo buildah bud \
            "${LABEL_ARGS[@]}" \
            --secret id=MOK_key,src=MOK.key \
            --secret id=MOK_crt,src=MOK.crt \
            --tag localhost/${{ env.IMAGE_NAME }}:latest \
            .
          
          # Clean up
          rm MOK.key MOK.crt

          # Apply all tags from metadata with sudo
          for tag in ${{ steps.metadata.outputs.tags }}; do
            sudo podman tag localhost/${{ env.IMAGE_NAME }}:latest $tag
          done

      # Rechunk nativo: suddivide l'immagine in layer OCI granulari per pacchetto RPM.
      # Questo permette aggiornamenti delta reali: il client scarica solo i layer che cambiano.
      - name: Run Rechunker (Chunked-OCI)
        id: rechunk
        run: |
          # Pulizia /run e /tmp dall'immagine (artefatti di build)
          container=$(sudo buildah from localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }})
          mnt=$(sudo buildah mount $container)
          sudo bash -c "rm -rf $mnt/run/.* $mnt/run/* $mnt/tmp/.* $mnt/tmp/*"
          sudo buildah umount $container
          sudo buildah commit --identity-label=false --rm $container localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}

          # Esegue rpm-ostree dall'interno dell'immagine stessa per generare layer semantici
          sudo podman run --rm --privileged \
            --volume /var/lib/containers:/var/lib/containers \
            localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} \
            rpm-ostree compose build-chunked-oci \
              --bootc \
              --max-layers 127 \
              --format-version 2 \
              --from localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} \
              --output containers-storage:localhost/chunked-${{ env.IMAGE_NAME }}

          # Rimuove l'immagine non-chunked per risparmiare spazio
          sudo podman untag localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}

          echo "ref=containers-storage:localhost/chunked-${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        run: |
          for tag in ${{ steps.metadata.outputs.tags }}; do
            dest_image="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
            sudo skopeo copy --authfile /home/runner/.docker/config.json ${{ steps.rechunk.outputs.ref }} docker://$dest_image --digestfile=/tmp/digestfile
          done
          echo "digest=$(</tmp/digestfile)" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.1'

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

